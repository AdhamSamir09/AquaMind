<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us | Aqua Mind</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: "Inter", "Segoe UI", sans-serif; background-color: #f8fafc; color: #0f172a; line-height: 1.6; }
      nav { display: flex; align-items: center; justify-content: space-between; background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); padding: 15px 5%; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); }
      .logo-wrapper { display: flex; align-items: center; text-decoration: none; gap: 12px; }
      .nav-logo-img { height: 70px; width: auto; display: block; }
      .logo-text { color: white; font-size: 1.5rem; font-weight: 700; letter-spacing: 0.5px; }
      .nav-links { display: flex; align-items: center; }
      nav a.menu-item { text-decoration: none; color: rgba(255, 255, 255, 0.85); font-weight: 500; font-size: 0.95rem; transition: 0.3s; padding: 8px 16px; border-radius: 20px; }
      nav a.menu-item:hover, nav a.menu-item.active { color: white; }
      nav a.menu-item.active { background: rgba(255, 255, 255, 0.2); }
      .wrapper { max-width: 1200px; margin: 60px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 1.4fr; gap: 50px; align-items: start; }
      .sidebar { background: #1e3a8a; color: white; padding: 50px; border-radius: 30px; box-shadow: 0 20px 40px rgba(30, 58, 138, 0.15); }
      .sidebar h2 { font-size: 2.5rem; margin-bottom: 20px; font-weight: 700; }
      .sidebar p { color: #eceef1; font-size: 1.1rem; margin-bottom: 40px; }
      .contact-item { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; text-decoration: none; color: white; transition: 0.3s; }
      .contact-item:hover { transform: translateX(10px); color: #93c5fd; }
      .contact-item i { width: 50px; height: 50px; background: rgba(255, 255, 255, 0.1); display: flex; align-items: center; justify-content: center; border-radius: 15px; font-size: 1.3rem; }
      .form-container { background: white; padding: 50px; border-radius: 30px; box-shadow: 0 10px 50px rgba(0, 0, 0, 0.03); }
      .form-group { margin-bottom: 25px; }
      .form-group label { display: block; margin-bottom: 10px; font-weight: 600; color: #475569; font-size: 0.95rem; }
      .form-group input, .form-group textarea { width: 100%; padding: 16px 20px; border: 1.5px solid #e2e8f0; border-radius: 15px; outline: none; font-size: 1rem; background: #f8fafc; transition: 0.3s; font-family: inherit; }
      .form-group input:focus, .form-group textarea:focus { border-color: #2563eb; background: white; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.05); }
      .submit-button { width: 100%; padding: 18px; background: #2563eb; color: white; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 12px; }
      .submit-button:hover { background: #1e40af; transform: translateY(-2px); box-shadow: 0 10px 25px rgba(37, 99, 235, 0.25); }
      .sys-info { margin-top: 40px; padding-top: 25px; border-top: 1px solid rgba(255, 255, 255, 0.1); font-size: 0.85rem; color: #93c5fd; }
      @media (max-width: 992px) { .wrapper { grid-template-columns: 1fr; gap: 30px; margin: 30px auto; } .sidebar { padding: 30px; } }
    </style>
  </head>
  <body>
    <nav>
      <a href="index.html" class="logo-wrapper">
        <img src="white_icon.png" alt="Logo" class="nav-logo-img" onerror="this.style.display='none'" />
        <span class="logo-text">AquaMind</span>
      </a>
      <div class="nav-links">
        <a href="dashboard.html" class="menu-item">Dashboard</a>
        <a href="control.html" class="menu-item">Control</a>
        <a href="contact.html" class="menu-item active">Contact Us</a>
      </div>
    </nav>
    <div class="wrapper">
      <div class="sidebar">
        <h2>Get in Touch</h2>
        <p>We would love to hear from you. Our team is here to support you with any questions or inquiries.</p>
        <div class="contact-links">
          <a href="mailto:Aquamindbusiness@gmail.com" class="contact-item"><i class="fas fa-envelope"></i><span>Aquamindbusiness@gmail.com</span></a>
          <a href="https://wa.me/201055978809" class="contact-item"><i class="fab fa-whatsapp"></i><span>+20 105 597 8809</span></a>
          <a href="https://instagram.com/Aquamind.analytics" class="contact-item"><i class="fab fa-instagram"></i><span>@Aquamind.analytics</span></a>
        </div>
        <div class="sys-info"><strong>Access Key:</strong> @Aqumind!2.</div>
      </div>
      <div class="form-container">
        <form id="aquaForm">
          <div class="form-group"><label>Full Name:</label><input type="text" id="userName" placeholder="Enter your name" required /></div>
          <div class="form-group"><label>Email Address:</label><input type="email" id="userEmail" placeholder="Enter your email" required /></div>
          <div class="form-group"><label>Enter your recommendation:</label><textarea id="userProblem" rows="6" placeholder="What's your problem or request?" required></textarea></div>
          <button type="submit" class="submit-button" id="submitBtn"><span>Send Message</span><i class="fas fa-paper-plane"></i></button>
        </form>
      </div>
    </div>
    <script>
      document.getElementById("aquaForm").addEventListener("submit", function (e) {
        e.preventDefault();
        const btn = document.getElementById("submitBtn");
        const name = document.getElementById("userName").value;

        btn.style.background = "#10b981";
        btn.innerHTML = "<span>Processing...</span>";

        setTimeout(() => {
          // Replaced native alert per Canvas environmental standards
          const msg = document.createElement('div');
          msg.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:white;padding:15px 30px;border-radius:10px;z-index:9999;box-shadow:0 10px 30px rgba(0,0,0,0.15);font-weight:600;';
          msg.innerText = "Thank you, " + name + ". Your inquiry has been received.";
          document.body.appendChild(msg);
          setTimeout(() => msg.remove(), 4000);

          btn.innerHTML = '<span>Message Sent</span> <i class="fas fa-check"></i>';
          btn.disabled = true;
        }, 1500);
      });
    </script>
  </body>
</html>
