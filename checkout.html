<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - AquaMind</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; }
      body { background: #f8fafc; color: #0f172a; min-height: 100vh; display: flex; flex-direction: column; }
      nav { display: flex; align-items: center; justify-content: space-between; background: linear-gradient(90deg, #1e3a8a 0%, #2563eb 100%); padding: 15px 25px; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2); margin-bottom: 30px; }
      .nav-brand { display: flex; align-items: center; gap: 12px; }
      .nav-brand h1 { color: #ffffff; font-size: 24px; margin: 0; padding: 0; border: none; }
      .logo-image { height: 50px; width: auto; display: block; }
      .nav-links { display: flex; gap: 15px; align-items: center; }
      nav a.menu-item, nav button.menu-item { text-decoration: none; color: rgba(255, 255, 255, 0.9); font-weight: 500; padding: 8px 16px; border-radius: 50px; transition: all 0.3s ease; font-size: 0.95rem; background: transparent; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; }
      nav a.menu-item:hover, nav a.menu-item.active, nav button.menu-item:hover { background-color: rgba(255, 255, 255, 0.2); color: white; }
      .dropdown { position: relative; }
      .dropdown-content { display: none; position: absolute; background-color: #ffffff; min-width: 160px; box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.15); z-index: 10; border-radius: 12px; margin-top: 10px; overflow: hidden; }
      .dropdown-content a { color: #333; padding: 12px 16px; text-decoration: none; display: block; text-align: left; font-size: 0.9rem; transition: 0.2s; }
      .dropdown-content a:hover { background-color: #f1f5f9; color: #2563eb; }
      .dropdown:hover .dropdown-content { display: block; }
      @media (max-width: 768px) { nav { flex-direction: column; gap: 15px; } .nav-links { width: 100%; justify-content: center; flex-wrap: wrap; } }
      .container { display: grid; grid-template-columns: 1.5fr 1fr; gap: 40px; padding: 0 8% 40px 8%; max-width: 1200px; margin: 0 auto; flex: 1; }
      @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
      .section-box { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 30px; }
      h2 { font-size: 22px; margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; }
      .payment-methods { display: flex; gap: 10px; margin-bottom: 25px; }
      .method-card { flex: 1; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 10px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
      .method-card i { font-size: 22px; margin-bottom: 5px; display: block; }
      .method-card span { font-size: 12px; }
      .method-card:hover, .method-card.active { border-color: #2563eb; background: #eff6ff; color: #2563eb; }
      .input-group { margin-bottom: 15px; }
      label { display: block; margin-bottom: 8px; color: #64748b; font-size: 13px; }
      input { width: 100%; padding: 12px; background: white; border: 1px solid #cbd5f5; border-radius: 8px; outline: none; transition: 0.3s; }
      input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
      .payment-details { display: none; }
      .payment-details.show { display: block; }
      .instruction-box { background: #eef2ff; border: 1px dashed #7c3aed; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; }
      .instruction-box strong { color: #7c3aed; font-size: 18px; display: block; margin: 5px 0; }
      .order-item { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; }
      .item-img { width: 70px; height: 70px; background: #eff6ff; border-radius: 10px; display: flex; align-items: center; justify-content: center; border: 1px solid #bfdbfe; }
      .item-img i { font-size: 28px; color: #2563eb; }
      .item-info h4 { font-size: 16px; }
      .item-info p { color: #64748b; font-size: 13px; }
      .item-price { margin-left: auto; font-weight: 600; }
      .totals { margin-top: 20px; border-top: 1px solid #e2e8f0; padding-top: 20px; }
      .total-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; color: #475569; }
      .total-row.final { font-size: 18px; color: #0f172a; font-weight: 700; margin-top: 15px; }
      .pay-btn { width: 100%; padding: 15px; margin-top: 20px; background: linear-gradient(90deg, #2563eb, #7c3aed); border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 16px; }
      .pay-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3); }
    </style>
  </head>
  <body>
    <nav>
      <div class="nav-brand" onclick="window.location.href='index.html'"><img src="white_icon.png" alt="" class="logo-image" onerror="this.style.display='none'"/><h1>AquaMind</h1></div>
      <div class="nav-links">
        <a href="#" class="menu-item">About Us</a> 
            <a href="equipment.html" class="menu-item">Equipment</a>
            <a href="feedback.html" class="menu-item">Feedbacks</a>
            <a href="contact.html" class="menu-item">Contact us</a> 
            <a href="logIn.html" class="menu-item">Log In</a> 
            <a href="signUp.html" class="menu-item">Sign up</a>
        </nav>
      </div>
    </nav>
    <div class="container">
      <div class="section-box">
        <h2>Payment Method</h2>
        <div class="payment-methods">
          <div class="method-card active" onclick="selectMethod('card',this)"><i class="fas fa-credit-card"></i><span>Card</span></div>
          <div class="method-card" onclick="selectMethod('insta',this)"><i class="fas fa-paper-plane"></i><span>InstaPay</span></div>
          <div class="method-card" onclick="selectMethod('wallet',this)"><i class="fas fa-wallet"></i><span>Wallet</span></div>
        </div>
        <div id="card-form" class="payment-details show">
          <div class="input-group"><label>Card Number</label><input type="text" placeholder="0000 0000 0000 0000" /></div>
          <div style="display: flex; gap: 15px">
            <div class="input-group" style="flex: 1"><label>Expiry</label><input type="text" placeholder="MM/YY" /></div>
            <div class="input-group" style="flex: 1"><label>CVC</label><input type="password" placeholder="123" /></div>
          </div>
          <div class="input-group"><label>Cardholder Name</label><input type="text" placeholder="Name on Card" /></div>
        </div>
        <div id="insta-form" class="payment-details">
          <div class="instruction-box"><p>Transfer to InstaPay:</p><strong>aquamind@instapay</strong></div>
          <input type="text" placeholder="Transaction ID" />
        </div>
        <div id="wallet-form" class="payment-details">
          <div class="instruction-box"><p>Vodafone Cash:</p><strong>010 1234 5678</strong></div>
          <input type="text" placeholder="Wallet Number" />
        </div>
      </div>
      <div class="section-box">
        <h2>Order Summary</h2>
        <div class="order-item"><div class="item-img"><i class="fas fa-microchip"></i></div><div class="item-info"><h4>AquaMind Smart Valve</h4><p>1x Device Kit</p></div><div class="item-price">2,500 EGP</div></div>
        <div class="totals">
          <div class="total-row"><span>Subtotal</span><span>2,500 EGP</span></div>
          <div class="total-row"><span>Shipping</span><span>50 EGP</span></div>
          <div class="total-row"><span>Tax</span><span>350 EGP</span></div>
          <div class="total-row final"><span>Total</span><span>2,900 EGP</span></div>
        </div>
        <button class="pay-btn" onclick="window.location.href='dashboard.html'">Confirm Payment</button>
      </div>
    </div>
    <script>
      function selectMethod(method, el) {
        document.querySelectorAll(".method-card").forEach((e) => e.classList.remove("active"));
        document.querySelectorAll(".payment-details").forEach((e) => e.classList.remove("show"));
        el.classList.add("active");
        if (method === "card") document.getElementById("card-form").classList.add("show");
        if (method === "insta") document.getElementById("insta-form").classList.add("show");
        if (method === "wallet") document.getElementById("wallet-form").classList.add("show");
      }
    </script>
  </body>
</html>
